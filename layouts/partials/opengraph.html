{{- $isHome := .IsHome -}}
{{- $pageTitle := cond $isHome .Site.Title (printf "%s | %s" .Title .Site.Title) -}}
{{- $description := or .Description .Params.Lede .Summary .Site.Params.Description -}}
{{- $image := "og.png" | absURL -}}

<meta property="og:title" content="{{ $pageTitle }}">
<meta property="og:description" content="{{ $description | plainify | htmlUnescape }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:image" content="{{ $image }}">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ $pageTitle }}">
<meta name="twitter:description" content="{{ $description | plainify | htmlUnescape }}">
<meta name="twitter:image" content="{{ $image }}">
